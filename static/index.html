<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Stock Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; }
        input {
            padding: 8px;
            font-size: 16px;
            width: 200px;
        }
        button {
            padding: 8px 16px;
            font-size: 16px;
            background: #2196F3;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        canvas {
            background: white;
            border-radius: 8px;
            margin-top: 20px;
            padding: 10px;
        }
        #error { color: red; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>📈 Stock Analyzer</h1>

    <input type="text" id="ticker" placeholder="T.ex. AAPL, TSLA" />
    <button onclick="fetchStock()">Analysera</button>
    <p id="error"></p>

    <canvas id="priceChart"></canvas>
    <canvas id="rsiChart"></canvas>

    <script src="/static/chart.js"></script>
</body>
</html>
